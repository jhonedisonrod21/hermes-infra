server:
  port: ${CONFIG_SERVER_PORT:8888}

spring:
  application:
    name: hermes-config-server
  profiles:
    # 'native' selecciona el backend de archivos del Config Server y debe estar
    # SIEMPRE activo, aunque la app fije SPRING_PROFILES_ACTIVE (local/dev).
    # Por eso se usa 'include' (aditivo) en vez de 'active' (sobrescribible).
    include: native
  cloud:
    config:
      server:
        native:
          search-locations: ${CONFIG_REPO_SEARCH_LOCATIONS:classpath:/config-repo}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
