server:
  port: ${HERMES_SCHEDULING_SERVICE_PORT:8083}

spring:
  application:
    name: hermes-scheduling-service
  datasource:
    url: ${HERMES_SCHEDULING_DATASOURCE_URL:${HERMES_DATASOURCE_URL:jdbc:mysql://localhost:3306/HERMES_CALENDAR}}
    username: ${HERMES_SCHEDULING_DATASOURCE_USERNAME:${HERMES_DATASOURCE_USERNAME:hermes_app}}
    password: ${HERMES_SCHEDULING_DATASOURCE_PASSWORD:${HERMES_DATASOURCE_PASSWORD:hermes_app_local}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: hermes-scheduling-db-pool
      maximum-pool-size: ${HERMES_SCHEDULING_DATASOURCE_MAX_POOL_SIZE:${HERMES_DATASOURCE_MAX_POOL_SIZE:10}}
      minimum-idle: ${HERMES_SCHEDULING_DATASOURCE_MIN_IDLE:${HERMES_DATASOURCE_MIN_IDLE:2}}
  servlet:
    multipart:
      # Anexos de archivo de las citas (tipo FILE). El límite "duro" lo aplica también el servicio.
      max-file-size: ${HERMES_STORAGE_MAX_FILE_SIZE:10MB}
      max-request-size: ${HERMES_STORAGE_MAX_REQUEST_SIZE:12MB}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: ${HERMES_JPA_FORMAT_SQL:false}
        type.preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: ${HERMES_SCHEDULING_FLYWAY_ENABLED:${HERMES_FLYWAY_ENABLED:true}}
    locations: ${HERMES_SCHEDULING_FLYWAY_LOCATIONS:${HERMES_FLYWAY_LOCATIONS:classpath:db/migration}}
    table: ${HERMES_SCHEDULING_FLYWAY_TABLE:flyway_schema_history_scheduling}
    create-schemas: false
    validate-on-migrate: ${HERMES_SCHEDULING_FLYWAY_VALIDATE_ON_MIGRATE:${HERMES_FLYWAY_VALIDATE_ON_MIGRATE:true}}
    clean-disabled: ${HERMES_SCHEDULING_FLYWAY_CLEAN_DISABLED:${HERMES_FLYWAY_CLEAN_DISABLED:true}}
    baseline-on-migrate: ${HERMES_SCHEDULING_FLYWAY_BASELINE_ON_MIGRATE:${HERMES_FLYWAY_BASELINE_ON_MIGRATE:true}}
    baseline-version: ${HERMES_SCHEDULING_FLYWAY_BASELINE_VERSION:${HERMES_FLYWAY_BASELINE_VERSION:0}}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${HERMES_AUTH_ISSUER_URI:http://127.0.0.1:5173/auth}
          jwk-set-uri: ${HERMES_AUTH_JWK_SET_URI:http://127.0.0.1:9000/oauth2/jwks}

# Almacenamiento de anexos (S3). En AWS basta bucket + región: endpoint/credenciales vacíos hacen que
# el SDK use S3 real con la cadena de credenciales por defecto (rol IAM). En local, el perfil 'local'
# sobrescribe endpoint/credenciales para apuntar a MinIO (ver application-local.yml).
hermes:
  storage:
    s3:
      bucket: ${HERMES_STORAGE_BUCKET:hermes-requirement-files}
      region: ${HERMES_STORAGE_REGION:us-east-1}
      endpoint: ${HERMES_STORAGE_ENDPOINT:}
      access-key: ${HERMES_STORAGE_ACCESS_KEY:}
      secret-key: ${HERMES_STORAGE_SECRET_KEY:}
      path-style-access: ${HERMES_STORAGE_PATH_STYLE_ACCESS:false}
