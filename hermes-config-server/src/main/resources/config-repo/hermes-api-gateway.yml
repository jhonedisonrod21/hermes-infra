server:
  port: ${HERMES_API_GATEWAY_PORT:8080}

spring:
  application:
    name: hermes-api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
              lower-case-service-id: true
          routes:
            - id: hermes-auth-server
              uri: lb://hermes-auth-server
              predicates:
                - Path=/auth/**
              filters:
                - StripPrefix=1
            - id: hermes-web-bff
              uri: lb://hermes-web-bff
              predicates:
                - Path=/bff/**
              filters:
                - StripPrefix=1
            - id: hermes-identity-service
              uri: lb://hermes-identity-service
              predicates:
                - Path=/identity/**
              filters:
                - StripPrefix=1
            - id: hermes-tenant-service
              uri: lb://hermes-tenant-service
              predicates:
                - Path=/tenant/**
              filters:
                - StripPrefix=1
            - id: hermes-catalog-service
              uri: lb://hermes-catalog-service
              predicates:
                - Path=/catalog/**
              filters:
                - StripPrefix=1
            - id: hermes-scheduling-service
              uri: lb://hermes-scheduling-service
              predicates:
                - Path=/scheduling/**
              filters:
                - StripPrefix=1
            - id: hermes-payment-service
              uri: lb://hermes-payment-service
              predicates:
                - Path=/payment/**
              filters:
                - StripPrefix=1
            - id: hermes-notification-service
              uri: lb://hermes-notification-service
              predicates:
                - Path=/notification/**
              filters:
                - StripPrefix=1
            - id: hermes-integration-hub-service
              uri: lb://hermes-integration-hub-service
              predicates:
                - Path=/integration/**
              filters:
                - StripPrefix=1
            - id: hermes-reports
              uri: lb://hermes-reports
              predicates:
                - Path=/reports/**
              filters:
                - StripPrefix=1
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${hermes.auth.issuer-uri}
          jwk-set-uri: ${HERMES_AUTH_JWK_SET_URI:http://127.0.0.1:9000/oauth2/jwks}

# Swagger UI agregado: una sola interfaz en el gateway que reune los specs reales de cada
# microservicio (con payloads, parametros y esquemas auto-generados desde sus DTOs/anotaciones).
# Cada url se descarga a traves del propio gateway (StripPrefix=1 -> /<servicio>/v3/api-docs).
springdoc:
  swagger-ui:
    # Grupo abierto por defecto: un servicio con contratos completos (DTOs, params, respuestas),
    # NO el overview del gateway (que es solo el mapa de rutas/roles y aparece al final).
    urls-primary-name: identity-service
    urls:
      - name: identity-service
        url: /identity/v3/api-docs
      - name: tenant-service
        url: /tenant/v3/api-docs
      - name: catalog-service
        url: /catalog/v3/api-docs
      - name: scheduling-service
        url: /scheduling/v3/api-docs
      - name: payment-service
        url: /payment/v3/api-docs
      - name: notification-service
        url: /notification/v3/api-docs
      - name: reports-service
        url: /reports/v3/api-docs
      - name: auth-server
        url: /auth/v3/api-docs
      - name: "zz - gateway (solo rutas y seguridad, sin DTOs)"
        url: /v3/api-docs
