server:
  port: ${HERMES_PAYMENT_SERVICE_PORT:8084}

spring:
  application:
    name: hermes-payment-service
  datasource:
    url: ${HERMES_PAYMENT_DATASOURCE_URL:${HERMES_DATASOURCE_URL:jdbc:mysql://localhost:3306/HERMES_COMMERCE}}
    username: ${HERMES_PAYMENT_DATASOURCE_USERNAME:${HERMES_DATASOURCE_USERNAME:hermes_app}}
    password: ${HERMES_PAYMENT_DATASOURCE_PASSWORD:${HERMES_DATASOURCE_PASSWORD:hermes_app_local}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: hermes-payment-db-pool
      maximum-pool-size: ${HERMES_PAYMENT_DATASOURCE_MAX_POOL_SIZE:${HERMES_DATASOURCE_MAX_POOL_SIZE:10}}
      minimum-idle: ${HERMES_PAYMENT_DATASOURCE_MIN_IDLE:${HERMES_DATASOURCE_MIN_IDLE:2}}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: ${HERMES_JPA_FORMAT_SQL:false}
        type.preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: ${HERMES_PAYMENT_FLYWAY_ENABLED:${HERMES_FLYWAY_ENABLED:true}}
    locations: ${HERMES_PAYMENT_FLYWAY_LOCATIONS:${HERMES_FLYWAY_LOCATIONS:classpath:db/migration}}
    table: ${HERMES_PAYMENT_FLYWAY_TABLE:flyway_schema_history_payment}
    create-schemas: false
    validate-on-migrate: ${HERMES_PAYMENT_FLYWAY_VALIDATE_ON_MIGRATE:${HERMES_FLYWAY_VALIDATE_ON_MIGRATE:true}}
    clean-disabled: ${HERMES_PAYMENT_FLYWAY_CLEAN_DISABLED:${HERMES_FLYWAY_CLEAN_DISABLED:true}}
    baseline-on-migrate: ${HERMES_PAYMENT_FLYWAY_BASELINE_ON_MIGRATE:${HERMES_FLYWAY_BASELINE_ON_MIGRATE:true}}
    baseline-version: ${HERMES_PAYMENT_FLYWAY_BASELINE_VERSION:${HERMES_FLYWAY_BASELINE_VERSION:0}}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${HERMES_AUTH_ISSUER_URI:http://127.0.0.1:5173/auth}
          jwk-set-uri: ${HERMES_AUTH_JWK_SET_URI:http://127.0.0.1:9000/oauth2/jwks}

hermes:
  payment:
    # Secreto HMAC del webhook de la pasarela. Sin valor por defecto: un arranque sin secreto explícito
    # falla (fail-fast). El valor de conveniencia para local vive en application-local.yml.
    webhook-secret: ${HERMES_PAYMENT_WEBHOOK_SECRET}
    # URL base a la que se envía al cliente a pagar. En local apunta al simulador de este mismo servicio.
    checkout-base-url: ${HERMES_PAYMENT_CHECKOUT_BASE_URL:http://127.0.0.1:8084}
  scheduling:
    base-url: ${HERMES_SCHEDULING_BASE_URL:http://hermes-scheduling-service}
