server:
  port: ${HERMES_NOTIFICATION_SERVICE_PORT:8085}

spring:
  application:
    name: hermes-notification-service
  datasource:
    url: ${HERMES_NOTIFICATION_DATASOURCE_URL:${HERMES_DATASOURCE_URL:jdbc:mysql://localhost:3306/HERMES_COMMERCE}}
    username: ${HERMES_NOTIFICATION_DATASOURCE_USERNAME:${HERMES_DATASOURCE_USERNAME:hermes_app}}
    password: ${HERMES_NOTIFICATION_DATASOURCE_PASSWORD:${HERMES_DATASOURCE_PASSWORD:hermes_app_local}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: hermes-notification-db-pool
      maximum-pool-size: ${HERMES_NOTIFICATION_DATASOURCE_MAX_POOL_SIZE:${HERMES_DATASOURCE_MAX_POOL_SIZE:10}}
      minimum-idle: ${HERMES_NOTIFICATION_DATASOURCE_MIN_IDLE:${HERMES_DATASOURCE_MIN_IDLE:2}}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: ${HERMES_JPA_FORMAT_SQL:false}
        type.preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: ${HERMES_NOTIFICATION_FLYWAY_ENABLED:${HERMES_FLYWAY_ENABLED:true}}
    locations: ${HERMES_NOTIFICATION_FLYWAY_LOCATIONS:${HERMES_FLYWAY_LOCATIONS:classpath:db/migration}}
    table: ${HERMES_NOTIFICATION_FLYWAY_TABLE:flyway_schema_history_notification}
    create-schemas: false
    validate-on-migrate: ${HERMES_NOTIFICATION_FLYWAY_VALIDATE_ON_MIGRATE:${HERMES_FLYWAY_VALIDATE_ON_MIGRATE:true}}
    clean-disabled: ${HERMES_NOTIFICATION_FLYWAY_CLEAN_DISABLED:${HERMES_FLYWAY_CLEAN_DISABLED:true}}
    baseline-on-migrate: ${HERMES_NOTIFICATION_FLYWAY_BASELINE_ON_MIGRATE:${HERMES_FLYWAY_BASELINE_ON_MIGRATE:true}}
    baseline-version: ${HERMES_NOTIFICATION_FLYWAY_BASELINE_VERSION:${HERMES_FLYWAY_BASELINE_VERSION:0}}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${HERMES_AUTH_ISSUER_URI:http://127.0.0.1:5173/auth}
          jwk-set-uri: ${HERMES_AUTH_JWK_SET_URI:http://127.0.0.1:9000/oauth2/jwks}
  # Quartz solo programa el latido de despacho; job-store en memoria (la cola + SKIP LOCKED da la
  # seguridad multi-instancia). El modo clúster con job-store JDBC es endurecimiento posterior.
  quartz:
    job-store-type: memory
  # SMTP de salida. En local apunta a Mailpit (contenedor hermes-containers/mailpit, puerto 1025).
  mail:
    host: ${HERMES_MAIL_HOST:localhost}
    port: ${HERMES_MAIL_PORT:1025}
    properties:
      mail:
        smtp:
          auth: ${HERMES_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${HERMES_MAIL_SMTP_STARTTLS:false}

hermes:
  notification:
    email:
      from: ${HERMES_NOTIFICATION_EMAIL_FROM:no-reply@hermes.local}
  identity:
    base-url: ${HERMES_IDENTITY_BASE_URL:http://hermes-identity-service}
