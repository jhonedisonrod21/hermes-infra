server:
  port: ${HERMES_AUTH_SERVER_PORT:9000}

spring:
  application:
    name: hermes-auth-server
  datasource:
    url: ${HERMES_AUTH_DATASOURCE_URL:${HERMES_DATASOURCE_URL:jdbc:mysql://localhost:3306/HERMES_IAM}}
    username: ${HERMES_AUTH_DATASOURCE_USERNAME:${HERMES_DATASOURCE_USERNAME:hermes_app}}
    password: ${HERMES_AUTH_DATASOURCE_PASSWORD:${HERMES_DATASOURCE_PASSWORD:hermes_app_local}}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: hermes-auth-db-pool
      maximum-pool-size: ${HERMES_AUTH_DATASOURCE_MAX_POOL_SIZE:${HERMES_DATASOURCE_MAX_POOL_SIZE:10}}
      minimum-idle: ${HERMES_AUTH_DATASOURCE_MIN_IDLE:${HERMES_DATASOURCE_MIN_IDLE:2}}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: ${HERMES_JPA_FORMAT_SQL:false}
        type.preferred_uuid_jdbc_type: CHAR
  flyway:
    enabled: ${HERMES_AUTH_FLYWAY_ENABLED:${HERMES_FLYWAY_ENABLED:true}}
    locations: ${HERMES_AUTH_FLYWAY_LOCATIONS:${HERMES_FLYWAY_LOCATIONS:classpath:db/migration}}
    table: ${HERMES_AUTH_FLYWAY_TABLE:flyway_schema_history_auth}
    create-schemas: false
    validate-on-migrate: ${HERMES_AUTH_FLYWAY_VALIDATE_ON_MIGRATE:${HERMES_FLYWAY_VALIDATE_ON_MIGRATE:true}}
    clean-disabled: ${HERMES_AUTH_FLYWAY_CLEAN_DISABLED:${HERMES_FLYWAY_CLEAN_DISABLED:true}}
    baseline-on-migrate: ${HERMES_AUTH_FLYWAY_BASELINE_ON_MIGRATE:${HERMES_FLYWAY_BASELINE_ON_MIGRATE:true}}
    baseline-version: ${HERMES_AUTH_FLYWAY_BASELINE_VERSION:${HERMES_FLYWAY_BASELINE_VERSION:0}}

hermes:
  web:
    login-url: ${HERMES_WEB_LOGIN_URL:http://127.0.0.1:5173}
  auth:
    jwk:
      key-id: ${HERMES_AUTH_JWK_KEY_ID:hermes-auth-local-key}
      public-key-pem: ${HERMES_AUTH_JWK_PUBLIC_KEY_PEM:}
      private-key-pem: ${HERMES_AUTH_JWK_PRIVATE_KEY_PEM:}
  identity:
    base-url: ${HERMES_IDENTITY_BASE_URL:http://hermes-identity-service}
    tenant-base-url: ${HERMES_TENANT_BASE_URL:http://hermes-tenant-service}
    internal-api-key: ${HERMES_INTERNAL_API_KEY:local-dev-internal-key}
  oauth:
    web-client:
      client-id: ${HERMES_WEB_CLIENT_ID:hermes-web-client}
      client-secret: ${HERMES_WEB_CLIENT_SECRET:{noop}hermes-web-secret}
      redirect-uris: ${HERMES_WEB_CLIENT_REDIRECT_URIS:http://127.0.0.1:5173/bff/login/oauth2/code/hermes-web-client,https://oauth.pstmn.io/v1/callback}
