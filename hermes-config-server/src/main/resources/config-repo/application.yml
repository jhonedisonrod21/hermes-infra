eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka/}
    registry-fetch-interval-seconds: ${EUREKA_REGISTRY_FETCH_INTERVAL_SECONDS:5}
  instance:
    lease-renewal-interval-in-seconds: ${EUREKA_LEASE_RENEWAL_INTERVAL_SECONDS:5}
    lease-expiration-duration-in-seconds: ${EUREKA_LEASE_EXPIRATION_DURATION_SECONDS:15}

management:
  endpoints:
    web:
      exposure:
        # metrics/prometheus quedan accesibles solo intra-clúster (el gateway hace denyAll de /*/actuator/**).
        include: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info,metrics,prometheus}
  tracing:
    sampling:
      probability: ${HERMES_TRACING_SAMPLING_PROBABILITY:0.1}
  endpoint:
    health:
      probes:
        enabled: true
      show-details: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:when_authorized}
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

hermes:
  auth:
    issuer-uri: ${HERMES_AUTH_ISSUER_URI:http://127.0.0.1:5173/auth}
    public-base-url: ${HERMES_AUTH_PUBLIC_BASE_URL:http://127.0.0.1:5173/auth}
    gateway-base-url: ${HERMES_AUTH_GATEWAY_BASE_URL:http://127.0.0.1:8080/auth}
  internal:
    # Sin valor por defecto: un arranque sin secreto explícito falla (fail-fast).
    # El valor de conveniencia para local vive en application-local.yml.
    api-key: ${HERMES_INTERNAL_API_KEY}

# Documentacion OpenAPI/Swagger: activa en local (base) como ayuda de desarrollo.
# El overlay application-dev.yml la deshabilita para el despliegue en la nube.
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
