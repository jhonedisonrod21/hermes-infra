# =====================================================================
# Perfil LOCAL  (SPRING_PROFILES_ACTIVE=local)
# ---------------------------------------------------------------------
# Ejecución en la máquina del desarrollador con `./gradlew startLocalServices`
# (los servicios corren como jars en el host).
#
# Los valores de conexión ya viven en los archivos base de cada servicio y
# apuntan a los contenedores locales. Una base MySQL por contexto acotado:
#   * IAM       -> jdbc:mysql://localhost:3306/HERMES_IAM       (auth, identity, tenant)
#   * Calendario-> jdbc:mysql://localhost:3306/HERMES_CALENDAR  (catalog, scheduling, integration-hub)
#   * Comercio  -> jdbc:mysql://localhost:3306/HERMES_COMMERCE  (payment, notification)
#   * SonarQube -> http://localhost:9001  (containers/sonarqube; build-time con
#                  `./gradlew sonar`, no es runtime)
#
# Aquí solo se añaden comodidades de desarrollo (más detalle/observabilidad).
# =====================================================================

spring:
  jpa:
    properties:
      hibernate:
        format_sql: true
  # Secreto del cliente OAuth en su forma CRUDA para que el BFF lo envíe (solo local).
  security:
    oauth2:
      client:
        registration:
          hermes-web-client:
            client-secret: hermes-web-secret

# Secretos de conveniencia SOLO para local (en los archivos base no hay default -> fail-fast).
hermes:
  # Credencial del SYSTEM_ADMIN sembrado SOLO en perfil local (LocalAdminSeeder). Fuera de local no se
  # siembra ninguna cuenta, por eso esta propiedad solo existe aquí (no hay password en el código fuente).
  local-admin:
    password: ${HERMES_LOCAL_ADMIN_PASSWORD:admin123}
  internal:
    api-key: local-dev-internal-key
  identity:
    internal-api-key: local-dev-internal-key
  payment:
    webhook-secret: local-dev-payment-webhook-secret
    # base64 de "0123456789abcdef0123456789abcdef" (32 bytes). SOLO local.
    config-encryption-key: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
    wompi:
      # URL base de la pasarela Wompi. En local apunta al simulador de banco (el servicio lo ignora:
      # para el código es simplemente la URL del proveedor).
      base-url: ${HERMES_WOMPI_BASE_URL:http://localhost:8099}
  storage:
    # Almacén de anexos: en local apunta a MinIO (contenedor S3-compatible). En AWS este bloque no
    # aplica y el servicio usa S3 real (endpoint/credenciales vacíos -> cadena por defecto del SDK).
    s3:
      endpoint: ${HERMES_STORAGE_ENDPOINT:http://localhost:9100}
      access-key: ${HERMES_STORAGE_ACCESS_KEY:hermes_minio}
      secret-key: ${HERMES_STORAGE_SECRET_KEY:hermes_minio_local}
      path-style-access: ${HERMES_STORAGE_PATH_STYLE_ACCESS:true}
  oauth:
    web-client:
      # Forma CODIFICADA que almacena el Auth Server ({noop} = sin cifrar, aceptable solo en local).
      client-secret: '{noop}hermes-web-secret'

# Cookie de sesión del BFF sin Secure (local corre por HTTP).
server:
  servlet:
    session:
      cookie:
        secure: false

management:
  endpoint:
    health:
      show-details: always

logging:
  level:
    co.com.hermes: DEBUG
    org.springframework.security: INFO
